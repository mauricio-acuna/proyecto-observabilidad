services:
  postgres:
    image: postgres:16-alpine
    container_name: proyecto2027-postgres
    environment:
      POSTGRES_DB: proyecto2027
      POSTGRES_USER: proyecto2027
      POSTGRES_PASSWORD: proyecto2027
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proyecto2027 -d proyecto2027"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: proyecto2027-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: proyecto2027
      RABBITMQ_DEFAULT_PASS: proyecto2027
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  redis:
    image: redis:7.2-alpine
    container_name: proyecto2027-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: proyecto2027-keycloak
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8089:8080"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: proyecto2027-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./desarrollo/02-observability-control-plane/otel-collector-config.yml:/etc/otel-collector-config.yml:ro

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: proyecto2027-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./desarrollo/02-observability-control-plane/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./desarrollo/02-observability-control-plane/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: proyecto2027-grafana
    environment:
      GF_SECURITY_ADMIN_USER: proyecto2027
      GF_SECURITY_ADMIN_PASSWORD: proyecto2027
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./desarrollo/02-observability-control-plane/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./desarrollo/02-observability-control-plane/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  prometheus-data:
  grafana-data:
