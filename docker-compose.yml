services:
  postgres:
    image: postgres:16-alpine
    container_name: proyecto2027-postgres
    environment:
      POSTGRES_DB: proyecto2027
      POSTGRES_USER: proyecto2027
      POSTGRES_PASSWORD: proyecto2027
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proyecto2027 -d proyecto2027"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: proyecto2027-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: proyecto2027
      RABBITMQ_DEFAULT_PASS: proyecto2027
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  redis:
    image: redis:7.2-alpine
    container_name: proyecto2027-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: proyecto2027-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8089:8080"
    volumes:
      - ./desarrollo/04-secure-api-gateway-identity/keycloak:/opt/keycloak/data/import:ro

  plataforma-soporte-bancario:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: Dockerfile.spring-app
      args:
        GRADLE_PROJECT: desarrollo:01-plataforma-soporte-bancario
        MODULE_DIR: desarrollo/01-plataforma-soporte-bancario
    container_name: proyecto2027-plataforma-soporte-bancario
    environment:
      SERVER_PORT: 8081
      APP_DATASOURCE_URL: jdbc:postgresql://postgres:5432/proyecto2027
      APP_DATASOURCE_USERNAME: proyecto2027
      APP_DATASOURCE_PASSWORD: proyecto2027
      APP_RABBITMQ_HOST: rabbitmq
      APP_RABBITMQ_USERNAME: proyecto2027
      APP_RABBITMQ_PASSWORD: proyecto2027
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  event-driven-notification-hub:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: Dockerfile.spring-app
      args:
        GRADLE_PROJECT: desarrollo:03-event-driven-notification-hub
        MODULE_DIR: desarrollo/03-event-driven-notification-hub
    container_name: proyecto2027-event-driven-notification-hub
    environment:
      SERVER_PORT: 8083
      APP_DATASOURCE_URL: jdbc:postgresql://postgres:5432/proyecto2027
      APP_DATASOURCE_USERNAME: proyecto2027
      APP_DATASOURCE_PASSWORD: proyecto2027
      APP_RABBITMQ_HOST: rabbitmq
      APP_RABBITMQ_USERNAME: proyecto2027
      APP_RABBITMQ_PASSWORD: proyecto2027
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  secure-api-gateway:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: Dockerfile.spring-app
      args:
        GRADLE_PROJECT: desarrollo:04-secure-api-gateway-identity
        MODULE_DIR: desarrollo/04-secure-api-gateway-identity
    container_name: proyecto2027-secure-api-gateway
    environment:
      SERVER_PORT: 8080
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_OIDC_ISSUER_URI: http://keycloak:8080/realms/proyecto2027
      APP_SUPPORT_PLATFORM_URI: http://plataforma-soporte-bancario:8081
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      plataforma-soporte-bancario:
        condition: service_started
      otel-collector:
        condition: service_started

  ai-ticket-triage-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: Dockerfile.spring-app
      args:
        GRADLE_PROJECT: desarrollo:12-ai-ticket-triage-service
        MODULE_DIR: desarrollo/12-ai-ticket-triage-service
    container_name: proyecto2027-ai-ticket-triage-service
    environment:
      SERVER_PORT: 8092
      APP_AI_PROVIDER: rule-based
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8092:8092"
    depends_on:
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: proyecto2027-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./desarrollo/02-observability-control-plane/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    depends_on:
      tempo:
        condition: service_started

  tempo:
    image: grafana/tempo:2.4.1
    container_name: proyecto2027-tempo
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4319:4317"
    volumes:
      - ./desarrollo/02-observability-control-plane/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: proyecto2027-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./desarrollo/02-observability-control-plane/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./desarrollo/02-observability-control-plane/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: proyecto2027-grafana
    environment:
      GF_SECURITY_ADMIN_USER: proyecto2027
      GF_SECURITY_ADMIN_PASSWORD: proyecto2027
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./desarrollo/02-observability-control-plane/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./desarrollo/02-observability-control-plane/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  prometheus-data:
  grafana-data:
  tempo-data:
