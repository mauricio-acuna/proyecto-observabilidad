spring:
  application:
    name: plataforma-soporte-bancario
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:postgresql://localhost:5432/proyecto2027}
    username: ${APP_DATASOURCE_USERNAME:proyecto2027}
    password: ${APP_DATASOURCE_PASSWORD:proyecto2027}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
