spring:
  application:
    name: event-driven-notification-hub
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:postgresql://localhost:5432/proyecto2027}
    username: ${APP_DATASOURCE_USERNAME:proyecto2027}
    password: ${APP_DATASOURCE_PASSWORD:proyecto2027}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${APP_RABBITMQ_HOST:localhost}
    port: ${APP_RABBITMQ_PORT:5672}
    username: ${APP_RABBITMQ_USERNAME:proyecto2027}
    password: ${APP_RABBITMQ_PASSWORD:proyecto2027}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: ${APP_RABBITMQ_RETRY_MAX_ATTEMPTS:3}
          initial-interval: ${APP_RABBITMQ_RETRY_INITIAL_INTERVAL_MS:1000}
          multiplier: ${APP_RABBITMQ_RETRY_MULTIPLIER:2.0}
          max-interval: ${APP_RABBITMQ_RETRY_MAX_INTERVAL_MS:10000}

app:
  notifications:
    ticket-created-recipient: ${APP_TICKET_CREATED_RECIPIENT:ops@example.com}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
