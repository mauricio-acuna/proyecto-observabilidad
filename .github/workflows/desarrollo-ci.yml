name: desarrollo-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile, test and generate coverage reports
        run: gradle clean test jacocoTestReport --console=plain
      - name: Validate Docker Compose
        run: docker compose config
      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: desarrollo/**/build/reports/jacoco/test
